<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </radialGradient>

    <symbol id="petal" viewBox="0 0 40 80">
      <path d="M20 2 C31 10 38 29 20 78 C2 29 9 10 20 2 Z" fill="url(#petalGrad)" stroke="#7c2d12" stroke-width="1.8"/>
    </symbol>

    <symbol id="flower" viewBox="0 0 120 120">
      <g>
        <g transform="rotate(0 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(45 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(90 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(135 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(180 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(225 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(270 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
        <g transform="rotate(315 60 60)"><use href="#petal" x="40" y="4" width="40" height="80"/></g>
      </g>
      <circle cx="60" cy="60" r="18" fill="url(#coreGrad)" stroke="#9f1239" stroke-width="2"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="240" height="160" fill="url(#bgA)"/>
  <use href="#flower" x="16" y="20" width="92" height="92"/>
  <g transform="rotate(-18 160 80)">
    <use href="#flower" x="116" y="26" width="88" height="88"/>
  </g>
  <use href="#flower" x="86" y="64" width="56" height="56"/>
</svg>
