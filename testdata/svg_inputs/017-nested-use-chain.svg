<svg width="240" height="140" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <symbol id="tile" viewBox="0 0 24 24">
      <rect x="1" y="1" width="22" height="22" rx="5" fill="url(#tileGrad)"/>
      <circle cx="12" cy="12" r="5" fill="#0f172a"/>
    </symbol>

    <symbol id="badge" viewBox="0 0 60 60">
      <rect x="4" y="4" width="52" height="52" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
      <use href="#tile" x="18" y="8" width="24" height="24"/>
      <use href="#tile" x="8" y="26" width="18" height="18"/>
      <use href="#tile" x="34" y="30" width="18" height="18"/>
    </symbol>

    <symbol id="cluster" viewBox="0 0 120 80">
      <use href="#badge" x="4" y="10" width="52" height="52"/>
      <use href="#badge" x="34" y="2" width="52" height="52"/>
      <use href="#badge" x="64" y="16" width="52" height="52"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="240" height="140" fill="#f8fafc"/>
  <use href="#cluster" x="10" y="18" width="120" height="80"/>
  <g transform="rotate(-8 176 70)">
    <use href="#cluster" x="124" y="26" width="104" height="70"/>
  </g>
</svg>
